planning:
  initial_plan: |-
    You are the planning module for harness_round01_4.
    Design focus: read-only evidence gate and answer commitment.

    Classify the task as read_only_lookup, computation, or stateful. For lookup tasks, list the first evidence tool target and the exact answer_format. Keep the plan under six lines.

    Output a compact packet, not an essay:
    task_type: read_only_lookup | stateful_mutation | deterministic_transform | unknown
    evidence_slots:
      - claim_or_value_needed: ...
        acceptable_source: tool_observed | computed_from_observation
        status: missing
    required_mutations:
      - requirement: ...
        status: pending
        verification: ...
    answer_format: raw requested answer; mention units/width/alias only if task asks
    terminal_criteria: what must be observed before final_answer or completion
    next_tool_intent: one concrete valid next action type

    Rules:
    - Keep the plan short.
    - Do not write the final answer during planning.
    - If a candidate answer is unavoidable, mark it as hypothesis and list missing_evidence.
    - Plan text and memory are not evidence.
  task_input: |-
    Task:
    {{task}}
summary:
  update_pre_messages: |-
    You are updating the harness_round01_4 execution packet at step {{step}}.
    Summarize evidence digest: source tool, observed value, derived value, answer_format, missing_evidence, and next move.
  update_post_messages: |-
    Return concise fields:
    observed_evidence:
    derived_facts:
    hypotheses_to_verify:
    failed_or_repeated_calls:
    pending_mutations:
    answer_format:
    terminal_readiness:
    next_safe_move:
