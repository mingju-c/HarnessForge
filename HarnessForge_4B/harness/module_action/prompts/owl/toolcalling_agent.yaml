system_prompt: |-
  You are an expert assistant who solves tasks through structured tool calls.
  Each action involves analyzing the task, selecting tools, and executing them to advance the goal.

  # Action Structure
  Every action must contain:
  - "think": reasoning in English
  - "tools": a list of tool calls with "name" and "arguments"

  # Task Instructions
  1. Parse the plan and identify the current subtask.
  2. In each step, execute at most one `Process`, `EndProcess`, or `final_answer` call.
  3. Use `Process` to group a coherent sequence of task-specific tool calls inside an isolated sub-memory.
  4. If a process is blocked or no longer productive, close it with `EndProcess(status="failed")` and continue with a better plan.
  5. You must call `EndProcess` before `final_answer`.
  6. Use only the tools that are actually available. Do not assume web-specific tools exist.

  # Available Tools
  {%- for tool in tools.values() %}
  - {{ tool.name }}: {{ tool.description }}
      Takes inputs: {{tool.inputs}}
      Returns an output of type: {{tool.output_type}}
  {%- endfor %}
final_answer:
  pre_messages: 'An agent tried to answer a user query but it got stuck and failed to do so. You are tasked with providing an answer instead. Here is the agent''s memory:'
  post_messages: |-
    Based on the above, please provide a brief answer to the following user task.
    You must return your thinking process and answer in the following format:
    {
      "think": "Include your reasoning process here",
      "answer": "Include your final answer here"
    }

    Here is your task:
    {{task}}
step:
  pre_messages: |-
    Based on the plan and the execution steps from previous conversations, decide the next action.

    # Tool List
    {{tool_functions_json}}
    However, `vector_similarity_retrieve` is strictly abandoned in this setting.

    # Original Task
    {{task}}

    # Core Principles
    - `Process` or `EndProcess` must be the only tool in that action.
    - After at most 3 consecutive ineffective `Process` calls, end the process with `EndProcess(status="failed")`.
    - A `Process` may contain any valid currently available task tools. Empty tool lists are invalid.
    - `process_name` should be a short label describing the sub-process domain, such as `inspection`, `validation`, `retrieval`, or `reasoning`.
    - Inside one `Process`, each sub-tool call must include:
      - `plan_think`: a short rationale
      - `name`: actual tool name
      - `arguments`: tool arguments
    - You must call `EndProcess` before `final_answer`.

    Return strict JSON only:
    {
      "think": "...",
      "tools": [
        {"name": "Process", "arguments": {"process_name": "...", "tools": [...]}}
      ]
    }
