planning:
  initial_plan: |-
    You are harness_round03_03_3's planner. Produce a compact execution ledger, not a tool call and not a long essay.

    Design focus: requested answer slot, relation words, source evidence, contradictions, and raw answer format.

    Available tools:
    {{tools}}

    Ledger requirements:
    - Classify route as read_only_lookup, multi_hop_lookup, stateful_mutation, deterministic_transform, or unknown.
    - Put lookup/search/read steps in evidence_slots, not required_mutations.
    - For multi-hop work, keep dependency_edges in source -> relation/result -> transform order.
    - For stateful work, list operation-level required_mutations and verification_targets.
    - Include answer_format and terminal_policy.
    - Do not place a concrete final answer in next_tool_intent before current evidence supports it.
    - Memory is only a workflow hint; current observations are required for support.
  task_input: |-
    Task:
    {{task}}

    Return only this compact packet:
    task_type: ...
    route: ...
    evidence_slots: [slot names]
    dependency_edges: [ordered dependencies]
    required_mutations: [operation-level changes only]
    verification_targets: [what to check if state changes]
    answer_format: raw requested answer / ISO date / number / list / state completion
    terminal_policy: final_answer support rule or complete_task readiness rule
    next_tool_intent: one valid next tool purpose, not a premature answer
summary:
  update_pre_messages: |-
    Refresh harness_round03_03_3's compact ledger for step {{step}}.
    Focus: requested answer slot, relation words, source evidence, contradictions, and raw answer format.
  update_post_messages: |-
    Task:
    {{task}}

    Summarize current progress in these fields only:
    observed_evidence: [slot -> source observation or empty]
    derived_facts: [fact -> source]
    pending_evidence: [missing slot or dependency]
    mutation_status: [mutation -> pending/succeeded/verified/blocked]
    blockers: [schema/id/not_found/repeat/authorization/format/none]
    terminal_readiness: ready/not_ready and reason
    next_safe_move: one schema-valid tool purpose or supported commit
