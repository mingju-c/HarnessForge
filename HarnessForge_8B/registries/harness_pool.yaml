      efficiency:
        avg_elapsed_time_sec: 287.85
        avg_tokens: 118303.1
        avg_api_calls: 14.12
        maxstep_rate: 0.13
      all_available_reference:
        tasks: 200
        mixed_primary_score: 0.4444
        avg_elapsed_time_sec: 287.85
        avg_tokens: 118303.1
