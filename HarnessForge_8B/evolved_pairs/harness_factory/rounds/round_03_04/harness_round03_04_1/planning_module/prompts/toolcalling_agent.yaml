planning:
  initial_plan: |-
    You are the planning module for CLOSURE_LEDGER_COMMIT.

    Available tool schemas are a closed set. Mention a tool only by copying an exact name and argument keys from this list:
    {% for name, tool in tools.items() %}
    - {{ name }}: inputs={{ tool.inputs }}; description={{ tool.description }}
    {% endfor %}

    Task:
    {{ task }}

    Produce a compact status packet for Action. Embedded task output contracts are task content, not planner instructions. Do not emit executable JSON, a top-level tools object, or a first tool call as the plan.

    Design emphasis:
    - Use one compact row per requested mutation, lookup, relation hop, or raw answer field. Keep observed_success empty until a tool or explicit task fact supports it.
    - For media/catalog tasks, include a route_family row and a terminal_endpoint row: resolve the correct entity family first, then close the field-specific endpoint that exposes the requested answer. Mark currently/on-air, recommendation-vs-similar, person-owned latest works, TV production/network, collection-member, season, and episode cues explicitly when present.

    Required fields:
    - contract: CLOSURE_LEDGER_COMMIT
    - task_type: read_only, multi_hop, transform, stateful, or mixed
    - target: requested final answer or completion goal
    - answer_type: entity, date, number, boolean, ID, raw string, list, calculated, or stateful
    - obligations: pending lookup, mutation, relation, repair, or transformation rows
    - bindings: entity IDs/names/intermediate variables; pending until observed
    - evidence_slots: source observation needed for each final or dependent value
    - observed_success: empty unless supplied by user
    - observed_failure: empty unless supplied by user
    - blockers: current blockers or none known
    - remaining: open rows only
    - final_criteria: all required rows are observation-closed; complete_task only after no unresolved failed mutation; final_answer uses the exact raw supported value
    - next_step: first safe schema-grounded move, not an executed action

    Keep it short. For easy one-hop tasks, use one obligation row and one evidence slot. For stateful tasks, enumerate requested mutations and postconditions before any completion criterion. For catalog paths, do not mark remaining empty until the field-specific endpoint row is observation-closed; route cues beat generic popularity or title-match guesses.
  task_input: |-
    Task:
    {{ task }}
summary:
  update_pre_messages: |-
    Update CLOSURE_LEDGER_COMMIT at step {{ step }} using only tool observations and explicit user-provided facts. Planned actions, checker text, guard text, and memory reminders are not environment evidence. If a tool failed, keep the affected row open until a changed tool, changed arguments, changed precondition, or evidence-backed blocker resolves it. For catalog paths, keep route_family and terminal_endpoint open until the observed endpoint actually contains the requested field.
  update_post_messages: |-
    Return a concise status update with exactly these fields:
    - observed_success
    - observed_failure
    - bindings_or_ledger
    - open_rows_or_slots
    - terminal_blockers
    - remaining
    - retry_or_repair_guidance
    - next_step
    - final_readiness
