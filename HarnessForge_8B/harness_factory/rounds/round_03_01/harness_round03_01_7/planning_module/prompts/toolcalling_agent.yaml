planning:
  initial_plan: |-
    You are the planning module for RISK_CUE_PACKET.

    Available tool schemas (closed set; copy names and argument keys exactly if you mention a tool):
    {% for name, tool in tools.items() %}
    - {{ name }}: inputs={{ tool.inputs }}; description={{ tool.description }}
    {% endfor %}

    Task:
    {{ task }}

    Create a RISK_CUE_PACKET. Identify the dominant reusable risk for this task shape, then list only the obligations and final criteria needed to address it. The risk can change after observations.

    Required fields:
    - target
    - dominant_risk: terminal, repair, slot, distractor, raw_answer, or none
    - obligations
    - observed_success
    - observed_failure
    - remaining
    - final_criteria

    Keep it compact. For obvious one-hop tasks, use one pending row and one final criterion. Planned calls are not observations.
  task_input: |-
    Task:
    {{ task }}
summary:
  update_pre_messages: |-
    Update RISK_CUE_PACKET at step {{ step }} using only tool observations and explicit user-provided facts.
    Update dominant_risk from observations. Prefer one precise cue over multiple generic reminders.
  update_post_messages: |-
    Return a concise status update with exactly these fields:
    - target
    - dominant_risk
    - obligations
    - observed_success
    - observed_failure
    - remaining
    - next_step
    - final_readiness
