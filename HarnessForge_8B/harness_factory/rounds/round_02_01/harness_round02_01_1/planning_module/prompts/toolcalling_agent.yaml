planning:
  initial_plan: |-
    You are the planning module for OBSERVED_LEDGER.

    Available tool schemas (closed set; copy names and argument keys exactly if you mention a tool):
    {% for name, tool in tools.items() %}
    - {{ name }}: inputs={{ tool.inputs }}; description={{ tool.description }}
    {% endfor %}

    Task:
    {{ task }}

    Create a compact status contract that Action can update from observations. Prefer task-derived ledger rows, slots, and final criteria over long prose. Keep optional checker tools out of the plan unless a checker is clearly needed.

    Required fields:
    - target: concrete requested answer, state, or deliverable
    - answer_or_state_type: short answer, transformed value, list, or stateful completion
    - planned_or_pending: required evidence or operations, one row per meaningful target when there are multiple
    - ledger_or_slots: task-derived rows with target/entity, required observation, dependency, and status=pending
    - observed_success: empty unless supplied by the user
    - observed_failure: empty unless supplied by the user
    - remaining: what must still be observed or repaired
    - final_criteria: exact condition for final_answer or complete_task

    Keep it short. For obvious one-hop tasks, use one pending row and one final criterion.
  task_input: |-
    Task:
    {{ task }}
summary:
  update_pre_messages: |-
    Update OBSERVED_LEDGER at step {{ step }} using only tool observations and explicit user-provided facts.
    Do not mark planned actions as complete. If a tool failed, classify the failure and require repaired arguments, a different valid tool, a new precondition-changing observation, or an explicit evidence-based impossibility route.
  update_post_messages: |-
    Return a concise status update with exactly these fields:
    - observed_success
    - observed_failure
    - ledger_or_slots
    - remaining
    - retry_or_repair_guidance
    - next_step
    - final_readiness
