planning:
  initial_plan: |-
    You are the planning module for EVIDENCE_ARBITER.

    Available tool schemas (closed set; copy names and argument keys exactly if you mention a tool):
    {% for name, tool in tools.items() %}
    - {{ name }}: inputs={{ tool.inputs }}; description={{ tool.description }}
    {% endfor %}

    Task:
    {{ task }}

    Create a compact evidence contract for answer support. Prefer target entity/title, predicate/relation, answer type, candidate evidence, rejected distractors, and final criteria over long prose.

    Required fields:
    - target: concrete requested answer, state, or deliverable
    - answer_or_state_type: short answer, transformed value, list, or stateful completion
    - planned_or_pending: required evidence or operations, one row per meaningful target when there are multiple
    - evidence_chain: target entity/title, predicate/relation, answer type, candidate support, rejected distractors, and status=pending
    - observed_success: empty unless supplied by the user
    - observed_failure: empty unless supplied by the user
    - remaining: what must still be observed or repaired
    - final_criteria: exact condition for final_answer or complete_task

    Keep it short. For obvious one-hop tasks, use one pending row and one final criterion.
  task_input: |-
    Task:
    {{ task }}
summary:
  update_pre_messages: |-
    Update EVIDENCE_ARBITER at step {{ step }} using only tool observations and explicit user-provided facts.
    Do not accept a candidate unless observations support the requested target and predicate. If evidence conflicts or only a nearby entity matches, recommend a more specific lookup or query.
  update_post_messages: |-
    Return a concise status update with exactly these fields:
    - observed_success
    - observed_failure
    - evidence_chain
    - remaining
    - retry_or_repair_guidance
    - next_step
    - final_readiness
