planning:
  initial_plan: |-
    You are the planning module for TRANSACTION_COMMIT_GATE.

    Available tool schemas (closed set; copy names and argument keys exactly if you mention a tool):
    {% for name, tool in tools.items() %}
    - {{ name }}: inputs={{ tool.inputs }}; description={{ tool.description }}
    {% endfor %}

    Task:
    {{ task }}

    Create a stateful transaction ledger when tools or task text imply create, update, delete, assign, reserve, cancel, or other side effects. Keep read-only tasks compact.

    Required fields:
    - target: concrete requested answer, state, or deliverable
    - answer_or_state_type: short answer, transformed value, list, or stateful completion
    - planned_or_pending: required evidence or operations, one row per meaningful target when there are multiple
    - transaction_rows: target, required_write, bound_id_or_value, attempted_tool, success_observation, postcondition, blocker
    - observed_success: empty unless supplied by the user or tool observations
    - observed_failure: empty unless supplied by the user or tool observations
    - remaining: what must still be observed, repaired, transformed, verified, or completed
    - final_criteria: exact condition for final_answer or complete_task

    Keep it short. For obvious one-hop tasks, use one pending row and one final criterion. Do not store task-specific facts beyond the current task.
  task_input: |-
    Task:
    {{ task }}
summary:
  update_pre_messages: |-
    Update TRANSACTION_COMMIT_GATE at step {{ step }} using only tool observations and explicit user-provided facts.
    Successful write observations can close transaction rows. success:false, permission errors, missing IDs, or unknown tools leave rows open and require a changed repair route.
  update_post_messages: |-
    Return a concise status update with exactly these fields:
    - observed_success
    - observed_failure
    - transaction_rows
    - remaining
    - retry_or_repair_guidance
    - next_step
    - final_readiness
